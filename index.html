
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFSSI - National Surveillance Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Leaflet Velocity CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-velocity@1.10.1/dist/leaflet-velocity.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f8fafc; /* Changed to slate-50 */
            -webkit-font-smoothing: antialiased;
        }

        #root {
            height: 100vh;
            width: 100vw;
        }

        /* Modern Scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #020617;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3b82f6;
        }

        /* Leaflet Overrides */
        .leaflet-container {
            width: 100%;
            height: 100%;
            background-color: #f8fafc !important;
        }
        .leaflet-popup-content-wrapper, .leaflet-popup-tip {
            background: #0f172a !important;
            color: white !important;
            border: 1px solid #334155;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.5);
            border-radius: 12px !important;
        }
        .leaflet-popup-content {
            margin: 0 !important;
        }
        .leaflet-bar {
            border: none !important;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.3) !important;
        }
        .leaflet-bar a {
            background-color: #ffffff !important;
            color: #475569 !important;
            border-bottom: 1px solid #e2e8f0 !important;
        }
        .leaflet-bar a:hover {
            background-color: #f1f5f9 !important;
            color: #0f172a !important;
        }

        /* Tooltip Overrides for Custom Hover Cards */
        .leaflet-tooltip {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            padding: 0 !important;
            font-size: 0; /* Hides default text handling if any */
        }
        .leaflet-tooltip-left:before, 
        .leaflet-tooltip-right:before, 
        .leaflet-tooltip-top:before, 
        .leaflet-tooltip-bottom:before {
            display: none !important;
        }
        
        /* Velocity Control Customization */
        .leaflet-control-velocity {
            background-color: #ffffff !important;
            color: #475569 !important;
            border: 1px solid #e2e8f0 !important;
            padding: 4px 8px !important;
            border-radius: 4px !important;
            font-family: 'JetBrains Mono', monospace !important;
            font-size: 10px !important;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.3) !important;
        }

        /* Custom UI Classes */
        .font-mono {
            font-family: 'JetBrains Mono', monospace !important;
        }

        .animate-scan {
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .google-style-popup .leaflet-popup-content-wrapper {
          padding: 0 !important;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "leaflet": "https://esm.sh/leaflet@1.9.4",
    "lucide-react": "https://esm.sh/lucide-react@0.463.0",
    "react-leaflet": "https://esm.sh/react-leaflet@5.0.0?external=react,react-dom,leaflet",
    "@google/genai": "https://esm.sh/@google/genai@1.38.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>
</body>
</html>
